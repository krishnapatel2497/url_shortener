    <div class="container">
      <h1>URL Shortner</h1>

      <p class="subtitle">Convert long URLs into short and shareable links.</p>

      <form action="/" method="post">
        <div class="form-group">
          <label for="url">Original URL</label>
          <input
            type="url"
            id="url"
            name="url"
            placeholder="https://example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="shortCode">Custom Short Code</label>
          <input
            type="text"
            id="shortCode"
            name="shortCode"
            placeholder="my-link"
            required
          />
        </div>

        <button type="submit">Shorten URL</button>
      </form>

      <h2>Your Shortened URLs</h2>
      <ul>
        {{shortened_urls}}
      </ul>
    </div>
